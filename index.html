function Stars() {
  const stars = Array.from({ length: 60 }, (_, i) => ({
    id: i,
    size: Math.random() * 2.5 + 0.5,
    top: Math.random() * 100,
    left: Math.random() * 100,

    delay: (Math.random() * 5).toFixed(1),
    op: (Math.random() * 0.5 + 0.1).toFixed(2),

  return (
    <div className="stars">

          width: s.size, height: s.size,
          top: `${s.top}%`, left: `${s.left}%`,
          '--dur': `${s.dur}s`, '--delay': `${s.delay}s`, '--op': s.op,
        }} />
      ))}

}

// =====================
// COUNTRY STATS
// =====================
function CountryStats({ onlineUsers }) {
  const [stats, setStats] = useState([]);
  useEffect(() => {
    const counts = onlineUsers.reduce((acc, u) => {
      const c = u.countryCode || 'XX';
      acc[c] = (acc[c] || 0) + 1;
      return acc;
    }, {});
    setStats(Object.entries(counts).map(([code, count]) => ({ code, count })).sort((a, b) => b.count - a.count));
  }, [onlineUsers]);
  if (!stats.length) return null;
  return (
    <div className="absolute top-12 left-4 bg-black/30 backdrop-blur text-white text-xs p-2 rounded-xl z-10 border border-white/10">
      <ul className="space-y-1">
        {stats.slice(0, 4).map(({ code, count }) => (
          <li key={code} className="flex items-center justify-between gap-2">
            <span className="font-bold">{count}</span>
            {code === 'XX' ? <span>🌐</span> :
              <img src={`https://flagcdn.com/w20/${code.toLowerCase()}.png`} width="20" alt={code} className="rounded-sm" />}
          </li>
        ))}
      </ul>
    </div>
  );
}

// =====================

// =====================
function TotalStats() {
  const [stats, setStats] = useState({ total_visits: 0, total_listeners: 0 });
  useEffect(() => {
    const ref = database.ref('/stats');
    const l = ref.on('value', snap => {
      const d = snap.val();
      if (d) setStats({ total_visits: d.total_visits || 0, total_listeners: d.total_listeners || 0 });
    });
    return () => ref.off('value', l);
  }, []);
  const fmt = n => n >= 1000000 ? (n/1000000).toFixed(1)+'م' : n >= 1000 ? (n/1000).toFixed(1)+'ألف' : n;
  return (
    <div className="absolute top-4 right-4 bg-black/30 backdrop-blur text-white text-xs px-3 py-2 rounded-xl z-10 border border-white/10 text-center">

}

// =====================
// INLINE CHAT WINDOW (always visible at bottom)
// =====================
function ChatWindow({ myName, onEditName }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const [expanded, setExpanded] = useState(true);
  const bottomRef = useRef(null);
  const MAX_MESSAGES = 50;
  const MAX_CHARS = 200;

  useEffect(() => {
    const ref = database.ref('/chat/messages').limitToLast(MAX_MESSAGES);
    const l = ref.on('value', snap => {
      const data = snap.val();
      if (!data) { setMessages([]); return; }
      const msgs = Object.entries(data).map(([k, v]) => ({ id: k, ...v }));
      msgs.sort((a, b) => a.timestamp - b.timestamp);
      setMessages(msgs);
    });
    return () => ref.off('value', l);
  }, []);

  useEffect(() => {
    if (expanded) {
      setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
    }
  }, [messages, expanded]);

  const sendMessage = async () => {
    const text = input.trim();
    if (!text || sending) return;
    setSending(true);
    try {
      await database.ref('/chat/messages').push({
        name: myName,
        text,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
      });
      setInput('');
    } catch(e) { console.error(e); }
    setSending(false);
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  const formatTime = (ts) => {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  // unread count when collapsed
  const [lastSeenCount, setLastSeenCount] = useState(0);
  const unread = expanded ? 0 : Math.max(0, messages.length - lastSeenCount);
  useEffect(() => {
    if (expanded) setLastSeenCount(messages.length);
  }, [expanded, messages.length]);

  return (
    <div
      className="fixed bottom-0 left-0 right-0 z-40 flex flex-col"
      style={{
        height: expanded ? '300px' : '44px',
        transition: 'height 0.3s ease',
        background: 'linear-gradient(180deg, rgba(15,5,30,0.97) 0%, rgba(10,5,25,0.99) 100%)',
        borderTop: '1px solid rgba(255,255,255,0.08)',
      }}
    >
      {/* Header bar — always visible, click to toggle */}
      <div
        className="flex items-center justify-between px-4 cursor-pointer flex-shrink-0"
        style={{ height: '44px' }}
        onClick={() => setExpanded(e => !e)}
      >
        <div className="flex items-center gap-2">
          <span className="text-white text-sm">💬</span>
          <span className="text-white text-sm font-bold">شات التعافي</span>
          {unread > 0 && (
            <span className="bg-purple-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
              {unread}
            </span>
          )}
        </div>
        <div className="flex items-center gap-3">
          <button
            onClick={e => { e.stopPropagation(); onEditName(); }}
            className="text-white/40 hover:text-white text-xs border border-white/10 px-2 py-0.5 rounded-lg transition-colors"
          >
            {myName}
          </button>
          <span className="text-white/40 text-xs">{expanded ? '▼' : '▲'}</span>
        </div>
      </div>

      {/* Messages area */}
      {expanded && (
        <div className="flex flex-col flex-1 overflow-hidden">
          <div className="chat-messages flex-1 overflow-y-auto px-4 py-2 space-y-2">
            {messages.length === 0 && (
              <div className="text-center text-white/25 text-xs mt-4">
                <p>كن أول من يكتب... الشات مجهول وآمن 🌙</p>
              </div>
            )}
            {messages.map((msg, i) => {
              const isMe = msg.name === myName;
              return (
                <div key={msg.id || i} className={`msg-fade flex items-end gap-1.5 ${isMe ? 'flex-row-reverse' : 'flex-row'}`}>
                  {!isMe && (
                    <span className="text-purple-300 text-xs font-bold flex-shrink-0 mb-1">{msg.name}</span>
                  )}
                  <div className={`max-w-[70%] px-3 py-1.5 rounded-2xl text-xs text-white leading-relaxed ${
                    isMe ? 'bg-purple-600/80 rounded-tr-sm' : 'bg-white/10 rounded-tl-sm'
                  }`}>
                    {msg.text}
                    <span className="text-white/30 text-xs mr-2">{formatTime(msg.timestamp)}</span>
                  </div>
                </div>
              );
            })}
            <div ref={bottomRef} />
          </div>

          {/* Input */}
          <div className="px-3 py-2 border-t border-white/5 flex gap-2 items-center flex-shrink-0">
            <input
              type="text"
              value={input}
              onChange={e => setInput(e.target.value.slice(0, MAX_CHARS))}
              onKeyDown={handleKey}
              placeholder="اكتب رسالتك..."
              className="flex-1 bg-white/8 text-white placeholder-white/25 rounded-xl px-3 py-2 text-xs outline-none border border-white/10 focus:border-purple-500/40 transition-colors"
              style={{background: 'rgba(255,255,255,0.06)'}}
            />
            <button
              onClick={sendMessage}
              disabled={!input.trim() || sending}
              className="w-9 h-9 rounded-full bg-purple-600 hover:bg-purple-500 disabled:opacity-30 transition-all flex items-center justify-center text-white flex-shrink-0 text-sm"
            >
              {sending ? '…' : '↑'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function seededShuffle(array, seed) {
  let ci = array.length, tv, ri;
  const rnd = () => { var x = Math.sin(seed++) * 10000; return x - Math.floor(x); };
  while (ci !== 0) { ri = Math.floor(rnd() * ci); ci--; tv = array[ci]; array[ci] = array[ri]; array[ri] = tv; }
  return array;
}

const PLAYLIST = seededShuffle([...ORIGINAL_PLAYLIST], dateSeed);
const RADIO_EPOCH = 1672531200000;
const totalPlaylistDuration = PLAYLIST.reduce((s, t) => s + t.duration, 0);

function getRadioState() {
  const now = Date.now();
  const elapsed = Math.floor((now - RADIO_EPOCH) / 1000);
  const pos = elapsed % totalPlaylistDuration;
  let acc = 0;
  for (let i = 0; i < PLAYLIST.length; i++) {
    if (pos < acc + PLAYLIST[i].duration) return { currentTrack: PLAYLIST[i], currentIndex: i, positionInTrack: pos - acc };
    acc += PLAYLIST[i].duration;
  }
  return { currentTrack: PLAYLIST[0], currentIndex: 0, positionInTrack: 0 };
}

// =====================
// MAIN APP
// =====================
function App() {
  const audioRef = useRef(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [volume, setVolume] = useState(0.7);
  const [onlineUsers, setOnlineUsers] = useState([]);
  const [currentTrackIndex, setCurrentTrackIndex] = useState(getRadioState().currentIndex);
  const [currentTime, setCurrentTime] = useState(getRadioState().positionInTrack);
  const [showNameModal, setShowNameModal] = useState(false);

  // Name logic — show setup only on first visit
  const [myName, setMyName] = useState(() => localStorage.getItem('radio_username') || null);
  const [showNameSetup, setShowNameSetup] = useState(() => !localStorage.getItem('radio_username'));

  const handleFirstSave = (name) => {
    setMyName(name);
    localStorage.setItem('radio_username', name);
    setShowNameSetup(false);
  };

  const handleEditSave = (name) => {
    setMyName(name);
    localStorage.setItem('radio_username', name);
    setShowNameModal(false);
  };

  const currentTrack = PLAYLIST[currentTrackIndex];
  const nextTrack = PLAYLIST[(currentTrackIndex + 1) % PLAYLIST.length];

  // Presence + Stats
  useEffect(() => {
    const statsRef = database.ref('/stats');
    statsRef.child('total_visits').set(firebase.database.ServerValue.increment(1));
    if (!localStorage.getItem('hasVisitedRadio')) {
      statsRef.child('total_listeners').set(firebase.database.ServerValue.increment(1));
      localStorage.setItem('hasVisitedRadio', 'true');
    }
    let sessionRef;
    async function getCountry() {
      try {
        const r = await fetch('https://ipapi.co/json/');
        const d = await r.json();
        return { countryCode: d.country_code, countryName: d.country_name };
      } catch { return { countryCode: 'XX', countryName: 'Unknown' }; }
    }
    async function setupPresence() {
      const id = Math.random().toString(36).substring(2);
      sessionRef = database.ref('/status/' + id);
      const loc = await getCountry();
      await sessionRef.set({ state: 'online', ...loc, last_seen: firebase.database.ServerValue.TIMESTAMP });
      sessionRef.onDisconnect().remove();
    }
    setupPresence();
    const hb = setInterval(() => {
      sessionRef?.child('last_seen').set(firebase.database.ServerValue.TIMESTAMP);
    }, 15000);
    const statusRef = database.ref('/status');
    const l = statusRef.on('value', snap => {
      const now = Date.now(), users = [];
      snap.forEach(c => {
        const u = c.val();
        if (u?.last_seen && now - u.last_seen < 35000) users.push(u);
        else if (u?.last_seen && now - u.last_seen > 60000) c.ref.remove();
      });
      setOnlineUsers(users);
    });
    return () => { clearInterval(hb); statusRef.off('value', l); sessionRef?.remove(); };
  }, []);

  // Audio logic
  useEffect(() => {
    const audio = audioRef.current;
    if (!audio || !currentTrack) return;
    const onTime = () => setCurrentTime(audio.currentTime);
    const onEnd = () => setCurrentTrackIndex(p => (p + 1) % PLAYLIST.length);
    audio.addEventListener('timeupdate', onTime);
    audio.addEventListener('ended', onEnd);
    if (audio.src !== new URL(currentTrack.url, window.location.href).href) audio.src = currentTrack.url;
    if (isPlaying) audio.play().catch(console.error);
    else audio.pause();
    return () => { audio.removeEventListener('timeupdate', onTime); audio.removeEventListener('ended', onEnd); };
  }, [currentTrack, isPlaying]);

  const togglePlay = () => {
    if (!isPlaying) {
      const state = getRadioState();
      setCurrentTrackIndex(state.currentIndex);
      audioRef.current.currentTime = state.positionInTrack;
      analytics.logEvent('playback_started', { track_title: PLAYLIST[state.currentIndex].title });
    } else {
      analytics.logEvent('playback_stopped');
    }
    setIsPlaying(p => !p);
  };

  const handleVolume = (e) => {
    const v = parseFloat(e.target.value);
    setVolume(v);
    if (audioRef.current) audioRef.current.volume = v;
  };

  const fmt = s => isNaN(s) ? '0:00' : `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const progress = (currentTime / currentTrack?.duration) * 100 || 0;

  if (!currentTrack) return (
    <div className="flex justify-center items-center h-screen text-white" style={{background:'linear-gradient(135deg,#1a0533,#0d1b4b)'}}>
      جارٍ التحميل...
    </div>
  );

  // Bottom padding = chat window height (44px collapsed or 300px expanded)
  return (
    <div className="h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden"
         style={{background: 'linear-gradient(135deg, #1a0533 0%, #0d1b4b 50%, #0a1628 100%)'}}>
      <Stars />

      <Listeners onlineCount={onlineUsers.length} />
      <CountryStats onlineUsers={onlineUsers} />
      <TotalStats />

      <audio ref={audioRef} />

      {/* Main Card — sits above chat window */}
      <div className="relative z-10 w-full max-w-sm" style={{marginBottom: '60px'}}>
        <div className="absolute inset-0 bg-purple-600/20 rounded-3xl blur-2xl transform scale-110"></div>
        <div className="relative bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 text-center shadow-2xl">

          <div className="mb-4">
            <h1 className="text-white text-2xl font-extrabold tracking-wide">راديو وليستعفف</h1>
            <div className="flex items-center justify-center gap-1 mt-1">
              <span className="w-1.5 h-1.5 bg-red-400 rounded-full pulse-dot"></span>
              <span className="text-red-400 text-xs font-medium">بث مباشر</span>
            </div>
          </div>

          <div className="bg-white/5 rounded-2xl p-3 mb-4 border border-white/10">
            <p className="text-white font-bold text-sm leading-relaxed">{currentTrack.title}</p>
            {nextTrack && (
              <p className="text-white/40 text-xs mt-1">التالي: {nextTrack.title}</p>
            )}
          </div>

          <button
            onClick={togglePlay}
            className={`w-18 h-18 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl transition-all duration-300 bg-white text-purple-900 ${isPlaying ? 'play-btn-glow' : 'hover:scale-105'}`}
            style={{width:'72px', height:'72px'}}
          >
            {isPlaying ? '⏸' : '▶'}
          </button>

          <div className="mb-3">
            <div className="flex justify-between text-xs text-white/40 mb-1">
              <span>{fmt(currentTime)}</span>
              <span>{fmt(currentTrack.duration)}</span>
            </div>
            <div className="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all duration-1000"
                style={{ width: `${progress}%`, background: 'linear-gradient(90deg, #a855f7, #ec4899)' }} />
            </div>
          </div>

          <input type="range" min="0" max="1" step="0.01" value={volume}
            onChange={handleVolume} className="w-full accent-purple-500 mb-4" />

          {/* Facebook only */}
          <div className="flex justify-center">
            <a href="https://www.facebook.com/groups/1594701261071238" target="_blank" rel="noopener noreferrer"
              className="flex items-center justify-center bg-white/10 hover:bg-white/20 border border-white/20 text-white w-10 h-10 rounded-xl transition-all">
              <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path fillRule="evenodd" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" clipRule="evenodd"/>
              </svg>
            </a>
          </div>
        </div>
      </div>

      {/* Chat Window — always at bottom, only shown after name setup */}
      {myName && (
        <ChatWindow myName={myName} onEditName={() => setShowNameModal(true)} />
      )}

      {/* First visit name setup */}
      {showNameSetup && (
        <NameSetupModal onSave={handleFirstSave} />
      )}

      {/* Edit name modal */}
      {showNameModal && (
        <NameEditModal
          currentName={myName}
          onSave={handleEditSave}
          onClose={() => setShowNameModal(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
