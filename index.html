function ChatPanel({ onClose, myName, onChangeName }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const bottomRef = useRef(null);
  const MAX_MESSAGES = 50;
  const MAX_CHARS = 200;

  useEffect(() => {
    const ref = database.ref('/chat/messages').limitToLast(MAX_MESSAGES);
    const l = ref.on('value', snap => {
      const data = snap.val();
      if (!data) { setMessages([]); return; }
      const msgs = Object.entries(data).map(([k, v]) => ({ id: k, ...v }));
      msgs.sort((a, b) => a.timestamp - b.timestamp);
      setMessages(msgs);
    });
    return () => ref.off('value', l);
  }, []);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const sendMessage = async () => {
    const text = input.trim();
    if (!text || sending) return;
    setSending(true);
    try {
      await database.ref('/chat/messages').push({
        name: myName,
        text,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
      });
      setInput('');
    } catch(e) { console.error(e); }
    setSending(false);
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  const formatTime = (ts) => {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  };

  return (
    <div className="slide-up fixed inset-0 z-50 flex flex-col" style={{background: 'linear-gradient(135deg, #1a0533 0%, #0d1b4b 100%)'}}>
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 border-b border-white/10 bg-black/20">
        <button onClick={onClose} className="text-white/60 hover:text-white transition-colors text-2xl leading-none">✕</button>
        <div className="text-center">
          <p className="text-white font-bold text-sm">غرفة الدعم المجهول</p>
          <p className="text-purple-300 text-xs">أنت: <span className="font-bold text-white">{myName}</span></p>
        </div>
        <button onClick={onChangeName} className="text-purple-300 hover:text-white transition-colors text-xs border border-purple-500/40 px-2 py-1 rounded-lg">
          تغيير
        </button>
      </div>

      {/* Messages */}
      <div className="chat-messages flex-1 overflow-y-auto px-4 py-3 space-y-3">
        {messages.length === 0 && (
          <div className="text-center text-white/30 text-sm mt-8">
            <p className="text-3xl mb-2">🌙</p>
            <p>كن أول من يكتب...</p>
            <p className="text-xs mt-1">كلامك مجهول وآمن</p>
          </div>
        )}
        {messages.map((msg, i) => {
          const isMe = msg.name === myName;
          return (
            <div key={msg.id || i} className={`msg-fade flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
              {!isMe && (
                <span className="text-purple-300 text-xs mb-1 font-bold">{msg.name}</span>
              )}
              <div className={`max-w-[80%] px-3 py-2 rounded-2xl text-sm text-white leading-relaxed ${
                isMe
                  ? 'bg-purple-600/80 rounded-tr-sm'
                  : 'bg-white/10 rounded-tl-sm'
              }`}>
                {msg.text}
              </div>
              <span className="text-white/25 text-xs mt-1">{formatTime(msg.timestamp)}</span>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>

      {/* Input */}
      <div className="px-4 py-3 border-t border-white/10 bg-black/20">
        <div className="flex gap-2 items-end">
          <div className="flex-1 relative">
            <textarea
              value={input}
              onChange={e => setInput(e.target.value.slice(0, MAX_CHARS))}
              onKeyDown={handleKey}
              placeholder="اكتب رسالتك..."
              rows={1}
              className="w-full bg-white/10 text-white placeholder-white/30 rounded-2xl px-4 py-2.5 text-sm resize-none outline-none border border-white/10 focus:border-purple-500/50 transition-colors"
              style={{minHeight: '44px', maxHeight: '100px'}}
            />
            {input.length > 150 && (
              <span className="absolute bottom-2 left-3 text-white/30 text-xs">{MAX_CHARS - input.length}</span>
            )}
          </div>
          <button
            onClick={sendMessage}
            disabled={!input.trim() || sending}
            className="w-11 h-11 rounded-full bg-purple-600 hover:bg-purple-500 disabled:opacity-30 disabled:cursor-not-allowed transition-all flex items-center justify-center text-white shadow-lg flex-shrink-0"
          >
            {sending ? '...' : '↑'}
          </button>
        </div>
        <p className="text-white/20 text-xs text-center mt-2">الشات مجهول تماماً • لا يوجد تسجيل</p>
      </div>
    </div>
  );
}

function seededShuffle(array, seed) {
  let ci = array.length, tv, ri;
  const rnd = () => { var x = Math.sin(seed++) * 10000; return x - Math.floor(x); };
  while (ci !== 0) { ri = Math.floor(rnd() * ci); ci--; tv = array[ci]; array[ci] = array[ri]; array[ri] = tv; }
  return array;
}
const today = new Date();
const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
const PLAYLIST = seededShuffle([...ORIGINAL_PLAYLIST], dateSeed);
const RADIO_EPOCH = 1672531200000;
const totalPlaylistDuration = PLAYLIST.reduce((s, t) => s + t.duration, 0);

function getRadioState() {
  const now = Date.now();
  const elapsed = Math.floor((now - RADIO_EPOCH) / 1000);
  const pos = elapsed % totalPlaylistDuration;
  let acc = 0;
  for (let i = 0; i < PLAYLIST.length; i++) {
    if (pos < acc + PLAYLIST[i].duration) return { currentTrack: PLAYLIST[i], currentIndex: i, positionInTrack: pos - acc };
    acc += PLAYLIST[i].duration;
  }
  return { currentTrack: PLAYLIST[0], currentIndex: 0, positionInTrack: 0 };
}

      const id = Math.random().toString(36).substring(2);
      sessionRef = database.ref('/status/' + id);
      const loc = await getCountry();
      await sessionRef.set({ state: 'online', ...loc, last_seen: firebase.database.ServerValue.TIMESTAMP });
      sessionRef.onDisconnect().remove();
    }
    setupPresence();

    const hb = setInterval(() => {
      sessionRef?.child('last_seen').set(firebase.database.ServerValue.TIMESTAMP);
    }, 15000);

    const statusRef = database.ref('/status');
    const l = statusRef.on('value', snap => {
      const now = Date.now(), users = [];
      snap.forEach(c => {
        const u = c.val();
        if (u?.last_seen && now - u.last_seen < 35000) users.push(u);
        else if (u?.last_seen && now - u.last_seen > 60000) c.ref.remove();
      });
      setOnlineUsers(users);
    });

    return () => { clearInterval(hb); statusRef.off('value', l); sessionRef?.remove(); };
  }, []);

  // Audio logic
  useEffect(() => {
    const audio = audioRef.current;
    if (!audio || !currentTrack) return;
    const onTime = () => setCurrentTime(audio.currentTime);
    const onEnd = () => setCurrentTrackIndex(p => (p + 1) % PLAYLIST.length);
    audio.addEventListener('timeupdate', onTime);
    audio.addEventListener('ended', onEnd);
    if (audio.src !== new URL(currentTrack.url, window.location.href).href) audio.src = currentTrack.url;
    if (isPlaying) audio.play().catch(console.error);
    else audio.pause();
    return () => { audio.removeEventListener('timeupdate', onTime); audio.removeEventListener('ended', onEnd); };
  }, [currentTrack, isPlaying]);

  const togglePlay = () => {
    if (!isPlaying) {
      const state = getRadioState();
      setCurrentTrackIndex(state.currentIndex);
      audioRef.current.currentTime = state.positionInTrack;
      analytics.logEvent('playback_started', { track_title: PLAYLIST[state.currentIndex].title });
    } else {
      analytics.logEvent('playback_stopped');
    }
    setIsPlaying(p => !p);
  };

  const handleVolume = (e) => {
    const v = parseFloat(e.target.value);
    setVolume(v);
    if (audioRef.current) audioRef.current.volume = v;
  };

  const fmt = s => isNaN(s) ? '0:00' : `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  const progress = (currentTime / currentTrack?.duration) * 100 || 0;

  if (!currentTrack) return (
    <div className="flex justify-center items-center h-screen text-white" style={{background:'linear-gradient(135deg,#1a0533,#0d1b4b)'}}>
      جارٍ التحميل...
    </div>
  );

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden"
         style={{background: 'linear-gradient(135deg, #1a0533 0%, #0d1b4b 50%, #0a1628 100%)'}}>
      <Stars />

      {/* Corner widgets */}
      <Listeners onlineCount={onlineUsers.length} />
      <CountryStats onlineUsers={onlineUsers} />
      <TotalStats />

      <audio ref={audioRef} />

      {/* Main Card */}
      <div className="relative z-10 w-full max-w-sm">
        {/* Glow behind card */}
        <div className="absolute inset-0 bg-purple-600/20 rounded-3xl blur-2xl transform scale-110"></div>

        <div className="relative bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-7 text-center shadow-2xl">
          {/* Title */}
          <div className="mb-5">
            <h1 className="text-white text-2xl font-extrabold tracking-wide">راديو وليستعفف</h1>
            <div className="flex items-center justify-center gap-1 mt-1">
              <span className="w-1.5 h-1.5 bg-red-400 rounded-full pulse-dot"></span>
              <span className="text-red-400 text-xs font-medium">بث مباشر</span>
            </div>
          </div>

          {/* Track info */}
          <div className="bg-white/5 rounded-2xl p-3 mb-5 border border-white/10">
            <p className="text-white font-bold text-sm leading-relaxed">{currentTrack.title}</p>
            {nextTrack && (
              <p className="text-white/40 text-xs mt-1.5">التالي: {nextTrack.title}</p>
            )}
          </div>

          {/* Play Button */}
          <button
            onClick={togglePlay}
            className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-5 text-3xl transition-all duration-300 ${
              isPlaying
                ? 'bg-white text-purple-900 play-btn-glow'
                : 'bg-white/90 text-purple-900 hover:bg-white hover:scale-105'
            }`}
          >
            {isPlaying ? '⏸' : '▶'}
          </button>

          {/* Progress */}
          <div className="mb-4">
            <div className="flex justify-between text-xs text-white/40 mb-1.5">
              <span>{fmt(currentTime)}</span>
              <span>{fmt(currentTrack.duration)}</span>
            </div>
            <div className="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
              <div
                className="h-full rounded-full transition-all duration-1000"
                style={{
                  width: `${progress}%`,
                  background: 'linear-gradient(90deg, #a855f7, #ec4899)'
                }}
              />
            </div>
          </div>

          {/* Volume */}
          <input
            type="range" min="0" max="1" step="0.01" value={volume}
            onChange={handleVolume}
            className="w-full accent-purple-500 mb-5"
          />

          {/* Action Buttons */}
          <div className="flex justify-center gap-3">
            {/* Chat Button */}
            <button
              onClick={() => setShowChat(true)}
              className="flex items-center gap-2 bg-white/10 hover:bg-white/20 border border-white/20 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition-all"
            >
              <span>💬</span>
              <span>الشات</span>
            </button>

            {/* SimpleX Button */}
            <a
              href={SIMPLEX_LINK}
              target="_blank"
              rel="noopener noreferrer"
              className="flex items-center gap-2 bg-purple-600/60 hover:bg-purple-600 border border-purple-500/40 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition-all"
            >
              <span>🔒</span>
              <span>تواصل سري</span>
            </a>

            {/* Facebook */}
            <a
              href="https://www.facebook.com/groups/1594701261071238"
              target="_blank"
              rel="noopener noreferrer"
              className="flex items-center justify-center bg-white/10 hover:bg-white/20 border border-white/20 text-white w-10 h-10 rounded-xl transition-all"
            >
              <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path fillRule="evenodd" d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z" clipRule="evenodd"/>
              </svg>
            </a>
          </div>
        </div>
      </div>

      {/* Chat Panel */}
      {showChat && (
        <ChatPanel
          onClose={() => setShowChat(false)}
          myName={myName}
          onChangeName={() => setShowNameModal(true)}
        />
      )}

      {/* Name Modal */}
      {showNameModal && (
        <NameModal currentName={myName} onSave={handleSaveName} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
